AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Celonis Process Agent on Amazon Bedrock AgentCore — provisions IAM roles,
  AgentCore Identity (OAuth2), AgentCore Gateway + MCP target, and Cognito
  User Pool for inbound JWT authentication.

# =============================================================================
# Parameters — everything that was previously hardcoded or in .env
# =============================================================================
Parameters:
  CelonisMcpServerUrl:
    Type: String
    Description: Celonis MCP Server endpoint URL (e.g. https://TEAM.REALM.celonis.cloud/studio-copilot/api/v1/mcp-servers/mcp/SERVER_ID)

  CelonisTokenUrl:
    Type: String
    Description: Celonis OAuth2 token endpoint (e.g. https://TEAM.REALM.celonis.cloud/oauth2/token)

  CelonisClientId:
    Type: String
    Description: Celonis OAuth2 application client ID
    NoEcho: true

  CelonisClientSecret:
    Type: String
    Description: Celonis OAuth2 application client secret
    NoEcho: true

  CelonisOAuthScope:
    Type: String
    Default: mcp-asset.tools:execute
    Description: OAuth scope for Celonis MCP access

  BedrockModel:
    Type: String
    Default: claude-sonnet-4.6
    AllowedValues:
      - claude-sonnet-4.5
      - claude-sonnet-4.6
      - claude-opus-4.5
      - claude-opus-4.6
      - claude-opus-4.7
      - claude-haiku-4.5
    Description: >
      Which Bedrock model to use. The template maps this to the correct
      inference profile and foundation model ARNs.
      Ensure the model is enabled in Bedrock Model Access for your region.

# =============================================================================
# Mappings — model lookup table + region-to-prefix mapping
# =============================================================================
Mappings:
  RegionToPrefix:
    us-east-1:
      Prefix: us
    us-east-2:
      Prefix: us
    us-west-1:
      Prefix: us
    us-west-2:
      Prefix: us
    ca-central-1:
      Prefix: us
    ca-west-1:
      Prefix: us
    eu-west-1:
      Prefix: eu
    eu-west-2:
      Prefix: eu
    eu-west-3:
      Prefix: eu
    eu-central-1:
      Prefix: eu
    eu-central-2:
      Prefix: eu
    eu-north-1:
      Prefix: eu
    eu-south-1:
      Prefix: eu
    eu-south-2:
      Prefix: eu
  ModelLookup:
    claude-sonnet-4.5:
      FoundationModelId: anthropic.claude-sonnet-4-5-20250929-v1:0
    claude-sonnet-4.6:
      FoundationModelId: anthropic.claude-sonnet-4-6
    claude-opus-4.5:
      FoundationModelId: anthropic.claude-opus-4-5-20250630-v1:0
    claude-opus-4.6:
      FoundationModelId: anthropic.claude-opus-4-6-v1
    claude-opus-4.7:
      FoundationModelId: anthropic.claude-opus-4-7
    claude-haiku-4.5:
      FoundationModelId: anthropic.claude-haiku-4-5-20250401-v1:0

# =============================================================================
# Resources
# =============================================================================
Resources:

  # ---------------------------------------------------------------------------
  # IAM Role: Gateway (used by AgentCore Gateway to fetch OAuth tokens)
  # ---------------------------------------------------------------------------
  GatewayRole:
    Type: AWS::IAM::Role
    Properties:
      Description: IAM role for Celonis AgentCore Gateway
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AgentCoreIdentityAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock-agentcore:GetCredentialProvider
                  - bedrock-agentcore:GetTokenVault
                  - bedrock-agentcore:IssueToken
                  - bedrock-agentcore:CreateWorkloadIdentity
                  - bedrock-agentcore:GetWorkloadAccessToken
                  - bedrock-agentcore:GetResourceOauth2Token
                Resource:
                  - !Sub arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:token-vault/default
                  - !Sub arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:token-vault/default/*
                  - !Sub arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default
                  - !Sub arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default/*
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:bedrock-agentcore-identity!default/oauth2/celonis-oauth-provider*

  # ---------------------------------------------------------------------------
  # IAM Role: Runtime (used by the AgentCore agent runtime)
  # ---------------------------------------------------------------------------
  RuntimeRole:
    Type: AWS::IAM::Role
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W11
            reason: aws-marketplace and ecr:GetAuthorizationToken actions do not support resource-level permissions
    Properties:
      Description: Execution role for Celonis AgentCore agent
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockInvokeModel
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:Converse
                  - bedrock:ConverseStream
                Resource:
                  # Foundation model in any region (geographic CRIS routes across the geo)
                  - !Sub
                    - arn:aws:bedrock:*::foundation-model/${FMId}
                    - FMId: !FindInMap [ModelLookup, !Ref BedrockModel, FoundationModelId]
                  # Geographic inference profile in the deployment region
                  - !Sub
                    - arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${Prefix}.${FMId}
                    - Prefix: !FindInMap [RegionToPrefix, !Ref "AWS::Region", Prefix]
                      FMId: !FindInMap [ModelLookup, !Ref BedrockModel, FoundationModelId]
              # Marketplace permissions for first-time model activation
              - Effect: Allow
                Action:
                  - aws-marketplace:ViewSubscriptions
                  - aws-marketplace:Subscribe
                Resource: '*'
        - PolicyName: ECRPullAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                Resource: !Sub arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/bedrock-agentcore-*
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/bedrock-agentcore/*
        - PolicyName: GatewayInvokeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: bedrock-agentcore:InvokeGateway
                Resource: !GetAtt McpGateway.GatewayArn

  # ---------------------------------------------------------------------------
  # AgentCore Identity: OAuth2 Credential Provider (stores Celonis creds)
  # ---------------------------------------------------------------------------
  CelonisOAuthProvider:
    Type: AWS::BedrockAgentCore::OAuth2CredentialProvider
    Properties:
      Name: celonis-oauth-provider
      CredentialProviderVendor: CustomOauth2
      Oauth2ProviderConfigInput:
        CustomOauth2ProviderConfig:
          ClientId: !Ref CelonisClientId
          ClientSecret: !Ref CelonisClientSecret
          OauthDiscovery:
            DiscoveryUrl: !Sub
              - ${BaseUrl}/.well-known/openid-configuration
              - BaseUrl: !Select [0, !Split ['/oauth2/', !Ref CelonisTokenUrl]]

  # ---------------------------------------------------------------------------
  # AgentCore Gateway (MCP protocol, IAM auth for agent → gateway)
  # ---------------------------------------------------------------------------
  McpGateway:
    Type: AWS::BedrockAgentCore::Gateway
    Properties:
      Name: celonis-mcp-gateway
      Description: MCP Gateway proxying to Celonis MCP Server with OAuth2
      ProtocolType: MCP
      AuthorizerType: AWS_IAM
      RoleArn: !GetAtt GatewayRole.Arn

  # ---------------------------------------------------------------------------
  # Gateway Target (points to Celonis MCP Server, uses OAuth2 for auth)
  # ---------------------------------------------------------------------------
  CelonisMcpTarget:
    Type: AWS::BedrockAgentCore::GatewayTarget
    Properties:
      GatewayIdentifier: !Ref McpGateway
      Name: cel
      Description: Celonis MCP Server target
      TargetConfiguration:
        Mcp:
          McpServer:
            Endpoint: !Ref CelonisMcpServerUrl
      CredentialProviderConfigurations:
        - CredentialProviderType: OAUTH
          CredentialProvider:
            OauthCredentialProvider:
              ProviderArn: !GetAtt CelonisOAuthProvider.CredentialProviderArn
              Scopes:
                - !Ref CelonisOAuthScope
              GrantType: CLIENT_CREDENTIALS

  # ---------------------------------------------------------------------------
  # Cognito User Pool (inbound JWT auth for Celonis → Agent)
  # ---------------------------------------------------------------------------
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: CelonisAgentCorePool
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      UserPoolId: !Ref CognitoUserPool
      Domain: !Sub celonis-agent-${AWS::AccountId}

  CognitoResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      UserPoolId: !Ref CognitoUserPool
      Identifier: celonis-agent
      Name: Celonis Agent Invocation
      Scopes:
        - ScopeName: invoke
          ScopeDescription: Invoke the agent

  CognitoAppClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: CognitoResourceServer
    Properties:
      UserPoolId: !Ref CognitoUserPool
      ClientName: celonis-caller
      GenerateSecret: true
      AllowedOAuthFlows:
        - client_credentials
      AllowedOAuthScopes:
        - celonis-agent/invoke
      AllowedOAuthFlowsUserPoolClient: true

# =============================================================================
# Outputs — used by the helper script to populate .env and .bedrock_agentcore.yaml
# =============================================================================
Outputs:
  GatewayUrl:
    Description: AgentCore Gateway URL (set as GATEWAY_URL)
    Value: !GetAtt McpGateway.GatewayUrl

  GatewayId:
    Description: AgentCore Gateway ID
    Value: !Ref McpGateway

  GatewayArn:
    Description: AgentCore Gateway ARN
    Value: !GetAtt McpGateway.GatewayArn

  RuntimeRoleArn:
    Description: IAM execution role ARN for the agent runtime
    Value: !GetAtt RuntimeRole.Arn

  CognitoUserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPool

  CognitoTokenUrl:
    Description: Cognito token endpoint URL
    Value: !Sub https://celonis-agent-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com/oauth2/token

  CognitoClientId:
    Description: Cognito app client ID
    Value: !Ref CognitoAppClient

  CognitoIssuerUrl:
    Description: Cognito issuer URL (for JWT authorizer)
    Value: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}

  CognitoScope:
    Description: Cognito OAuth scope
    Value: celonis-agent/invoke

  BedrockModelIdResolved:
    Description: Full Bedrock model ID for agent runtime (e.g. eu.anthropic.claude-opus-4-6-v1)
    Value: !Sub
      - ${Prefix}.${FMId}
      - Prefix: !FindInMap [RegionToPrefix, !Ref "AWS::Region", Prefix]
        FMId: !FindInMap [ModelLookup, !Ref BedrockModel, FoundationModelId]
